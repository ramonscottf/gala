<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Room Roster · DEF Gala 2026</title>
<meta name="theme-color" content="#0d1b3d">
<link rel="manifest" href="/rooms/manifest.webmanifest">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gala Rooms">
<meta name="application-name" content="Gala Rooms">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="/assets/seatmini.js"></script>
<style>
:root{ --navy:#0b1b3c; --navy-deep:#050b1c; --gold:#ffc24d; --blue:#2858d6; --red:#CB262C;
  --rule:rgba(255,255,255,0.10); --mute:rgba(255,255,255,0.65); }
*{box-sizing:border-box;} html,body{margin:0;padding:0;}
body{ min-height:100vh; color:#fff; font-family:'Inter',system-ui,sans-serif;
  background:#070a1d;
  background-image:radial-gradient(ellipse 120% 60% at 50% -10%, #24508f 0%, #122a57 35%, #0b1b3c 75%, #050b1c 100%);
  background-attachment:fixed; padding:14px 12px 60px; }
.strip{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#2858d6,#CB262C,#4a7df0,#CB262C);z-index:60;}
.wrap{max-width:760px;margin:0 auto;}
h1{font-family:'Fraunces',Georgia,serif;font-size:26px;margin:10px 0 2px;}
.sub{color:var(--mute);font-size:13px;margin-bottom:14px;}
.live{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:#34d399;}
.live .dot{width:8px;height:8px;border-radius:99px;background:#34d399;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.card{background:rgba(17,28,60,0.72);border:1px solid var(--rule);border-radius:14px;padding:16px;margin-bottom:16px;}
.show-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
.show-head .movie{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:700;}
.show-head .time{color:var(--gold);font-weight:800;font-size:15px;}
.show-head .count{margin-left:auto;color:var(--mute);font-size:13px;}
.mapbox{background:rgba(5,11,28,0.55);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px;overflow-x:auto;margin:10px 0;}
table{width:100%;border-collapse:collapse;font-size:15px;}
td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.07);vertical-align:top;}
td.seat{font-weight:800;color:var(--gold);width:54px;white-space:nowrap;font-size:16px;}
td.dinner{color:var(--mute);text-align:right;white-space:nowrap;font-size:13px;width:120px;}
.rowbreak td{border-bottom:1px solid rgba(255,255,255,0.18);}
.idx a{display:block;background:rgba(17,28,60,0.72);border:1px solid var(--rule);border-radius:12px;
  padding:14px 16px;margin-bottom:10px;color:#fff;text-decoration:none;font-weight:700;font-size:16px;}
.idx a span{color:var(--mute);font-weight:400;font-size:13px;display:block;margin-top:2px;}
.loginbox input{width:100%;padding:13px;border-radius:10px;border:1px solid var(--rule);
  background:rgba(7,13,33,0.65);color:#fff;font-size:16px;margin-bottom:10px;}
.loginbox button{width:100%;padding:13px;border-radius:10px;border:none;background:var(--blue);
  color:#fff;font-weight:800;font-size:15px;cursor:pointer;}
.err{color:#ff8a8a;font-size:13px;margin-top:8px;}
.stamp{color:rgba(255,255,255,0.45);font-size:11.5px;text-align:center;margin-top:8px;}

.toolrow{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:0 0 16px;}
.showtoggle{display:inline-flex;background:rgba(8,13,40,0.6);border:1px solid var(--rule);border-radius:999px;padding:4px;gap:4px;}
.showpill{border:none;background:transparent;color:var(--mute);font-family:inherit;font-size:13.5px;font-weight:800;letter-spacing:0.02em;padding:8px 18px;border-radius:999px;cursor:pointer;}
.showpill.on{background:#f4b942;color:#1a1502;}
.scanbtn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:999px;background:rgba(74,125,240,0.18);border:1px solid rgba(74,125,240,0.45);color:#9fb8ff;font-size:13.5px;font-weight:800;text-decoration:none;letter-spacing:0.02em;}

td.co{color:var(--mute);text-align:right;font-size:13px;}
tr.g{cursor:pointer;}
tr.g.sel td{background:rgba(244,185,66,0.13);}
tr.g.sel td.seat{color:#f4b942;box-shadow:inset 3px 0 0 #f4b942;}
.maphint{font-size:11.5px;color:var(--mute);text-align:center;margin:6px 0 12px;}
.sorttoggle{display:inline-flex;background:rgba(8,13,40,0.6);border:1px solid var(--rule);border-radius:999px;padding:4px;gap:4px;margin:0 0 12px;}
button,a,tr.g{touch-action:manipulation;-webkit-tap-highlight-color:rgba(244,185,66,0.25);}
.showpill:active,.scanbtn:active,.backbtn:active{transform:scale(0.96);}
.backbtn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:999px;background:rgba(255,255,255,0.08);border:1px solid var(--rule);color:#fff;font-size:13.5px;font-weight:800;text-decoration:none;letter-spacing:0.02em;}
</style>
</head>
<body>
<div class="strip"></div>
<div class="wrap" id="app"><div class="card">Loading…</div></div>
<script>
const DINNERS = { frenchdip:'Hot French Dip', salad:'Chicken Salad', veggie:'Vegetarian', kids:'Kids Meal' };
const app = document.getElementById('app');
const AUD = new URL(location.href).searchParams.get('aud');
let layouts = null, timer = null;

async function fetchDirectory() {
  const r = await fetch('/api/gala/admin/directory', { credentials: 'include' });
  if (r.status === 401) return { auth: false };
  if (!r.ok) throw new Error('directory ' + r.status);
  const d = await r.json();
  return { auth: true, rows: d.rows || [] };
}

function renderLogin() {
  app.innerHTML = `
    <h1>Room Roster</h1>
    <div class="sub">Gala helpers — enter the gala password once on this device.</div>
    <div class="card loginbox">
      <input type="password" id="pw" placeholder="Gala password" autocomplete="current-password">
      <button data-act="login">Open rosters</button>
      <div class="err" id="loginerr"></div>
    </div>`;
}
async function doLogin() {
  const pw = document.getElementById('pw').value;
  const r = await fetch('/api/gala/login', { method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pw }) });
  if (r.ok) boot(); else document.getElementById('loginerr').textContent = 'Wrong password — ask Scott (801-810-6642).';
}

function renderIndex(rows) {
  const byAud = new Map();
  rows.forEach(r => {
    if (!byAud.has(r.theater_id)) byAud.set(r.theater_id, { n: 0, movies: new Set() });
    const a = byAud.get(r.theater_id); a.n++; if (r.movie) a.movies.add(r.movie);
  });
  const links = [...byAud.entries()].sort((a,b)=>a[0]-b[0]).map(([t, a]) =>
    `<a href="?aud=${t}">Auditorium ${t}<span>${[...a.movies].join(' · ')} — ${a.n} guests</span></a>`).join('');
  app.innerHTML = `
    <h1>Room Rosters</h1>
    <div class="sub">Tap your auditorium. Pages refresh themselves — leave them open.</div>
    <div class="toolrow"><a class="scanbtn" href="/checkin/">\u{1F4F7} Scan a ticket — guest QR shows their seats</a></div>
    <div class="idx">${links || '<div class="card">No seated guests yet.</div>'}</div>`;
}

function autoShowing() {
  try {
    const parts = new Intl.DateTimeFormat('en-US', { timeZone: 'America/Denver', hour12: false, hour: 'numeric', minute: 'numeric' }).formatToParts(new Date());
    const h = +parts.find(p=>p.type==='hour').value, m = +parts.find(p=>p.type==='minute').value;
    return (h * 60 + m) >= (18 * 60 + 45) ? 2 : 1;   // 6:45 PM MT cutoff
  } catch (e) { return 1; }
}
let SHOW = (() => {
  const q = new URLSearchParams(location.search).get('show');
  return (q === '1' || q === '2') ? Number(q) : autoShowing();
})();
function setShow(n) {
  SHOW = n;
  const u = new URL(location.href); u.searchParams.set('show', String(n));
  history.replaceState(null, '', u);
  if (LAST_ROWS) renderRoom(LAST_ROWS); else boot();
}

// Sort + party-highlight state. LAST_ROWS lets taps re-render without a refetch.
let SORT = 'seat';            // 'seat' | 'name' | 'company'
let SEL = null;               // party key 'd{delegation_id}' or 's{sponsor_id}'
let LAST_ROWS = null;
function partyKey(r) { return r.delegation_id ? 'd' + r.delegation_id : 's' + r.sponsor_id; }
function dispName(r) { return r.delegate_name || r.guest_name || r.company || 'Guest'; }
function dispCompany(r) {
  const c = r.parent_company || r.company || '';
  return c === dispName(r) ? '' : c;
}
function setSort(m) { SORT = m; if (LAST_ROWS) renderRoom(LAST_ROWS); }
function setSel(k) { SEL = (SEL === k ? null : k); if (LAST_ROWS) renderRoom(LAST_ROWS); }

function renderRoom(rows) {
  LAST_ROWS = rows;
  const mine = rows.filter(r => String(r.theater_id) === String(AUD));
  const byShow = new Map();
  mine.forEach(r => {
    const k = r.showing_number;
    if (!byShow.has(k)) byShow.set(k, []);
    byShow.get(k).push(r);
  });

  // Showtime toggle — only render the showing that's on deck. Auto-picks
  // by clock (Early before 6:45 PM MT), pills override, URL remembers.
  const showKeys = [...byShow.keys()].sort((a,b)=>a-b);
  let toggle = '';
  if (showKeys.length > 1) {
    if (!byShow.has(SHOW)) SHOW = showKeys[0];
    toggle = `<div class="showtoggle">` + showKeys.map(sh => {
      const t = (byShow.get(sh)[0].show_start || '').trim();
      const lbl = (sh === 1 ? 'Early' : 'Late') + (t ? ' \u00b7 ' + t : '');
      return `<button class="showpill${sh === SHOW ? ' on' : ''}" data-act="show" data-val="${sh}">${lbl}</button>`;
    }).join('') + `</div>`;
  }
  const sections = [...byShow.entries()].sort((a,b)=>a[0]-b[0])
    .filter(([sh]) => showKeys.length < 2 || sh === SHOW)
    .map(([sh, seats]) => {
    const first = seats[0];
    const bySeat = (a,b) => a.row.localeCompare(b.row) || (Number(a.num)-Number(b.num));
    const sorted = seats.slice().sort(
      SORT === 'name'    ? (a,b) => dispName(a).localeCompare(dispName(b)) || bySeat(a,b)
    : SORT === 'company' ? (a,b) => (dispCompany(a)||dispName(a)).localeCompare(dispCompany(b)||dispName(b)) || bySeat(a,b)
    : bySeat);
    const occupied = new Set(seats.map(s => s.seat));
    const selSeats = SEL ? seats.filter(s => partyKey(s) === SEL).map(s => s.seat) : [];
    const names = seats.map(s => `${s.seat}|${esc(s.guest_name || s.delegate_name || s.company || '')}`).join('~');
    let lastRow = null;
    const trs = sorted.map(s => {
      const brk = (SORT === 'seat' && lastRow && lastRow !== s.row) ? ' style="border-top:2px solid rgba(255,255,255,0.16);"' : '';
      lastRow = s.row;
      const k = partyKey(s);
      return `<tr class="g${SEL === k ? ' sel' : ''}" data-g="${k}">
        <td class="seat"${brk}>${s.seat}</td>
        <td${brk}>${esc(dispName(s))}</td>
        <td class="co"${brk}>${esc(dispCompany(s))}</td></tr>`;
    }).join('');
    return `
      <div class="card">
        <div class="show-head">
          <span class="movie">${esc(first.movie || 'Showing ' + sh)}</span>
          <span class="time">${esc(first.show_start || (sh === 1 ? 'Early' : 'Late'))}</span>
          <span class="count">${seats.length} seated</span>
        </div>
        <div class="mapbox seatmini" data-occ="${seats.map(s=>s.seat).join(',')}" data-sel="${selSeats.join(',')}" data-names="${names}"></div>
        <div class="maphint">Tap any seat or name \u2014 their whole party lights up gold.</div>
        <div class="sorttoggle">
          <button class="showpill${SORT==='seat'?' on':''}" data-act="sort" data-val="seat">Seat</button>
          <button class="showpill${SORT==='name'?' on':''}" data-act="sort" data-val="name">Name</button>
          <button class="showpill${SORT==='company'?' on':''}" data-act="sort" data-val="company">Company</button>
        </div>
        <table><tbody>${trs}</tbody></table>
      </div>`;
  }).join('');

  app.innerHTML = `
    <div class="toolrow" style="margin:2px 0 8px;"><a class="backbtn" href="/rooms/">\u2039 All rooms</a></div>
    <h1>Auditorium ${esc(AUD)}</h1>
    <div class="sub"><span class="live"><span class="dot"></span>LIVE</span> · read-only roster for greeters &amp; seat helpers · <a href="/rooms/" style="color:var(--mute);">all rooms</a></div>
    <div class="toolrow">${toggle}<a class="scanbtn" href="/checkin/">\u{1F4F7} Scan a ticket</a></div>
    ${sections || '<div class="card">No guests seated in this auditorium yet.</div>'}
    <div class="stamp">Updated ${new Date().toLocaleTimeString()} · refreshes automatically · trouble? Scott 801-810-6642</div>`;
  paintMaps();
}

function esc(x){ const d=document.createElement('div'); d.textContent=x==null?'':String(x); return d.innerHTML; }

async function paintMaps() {
  try {
    layouts = layouts || await SeatMini.load();
    const th = SeatMini.theater(layouts, AUD);
    if (!th) return;
    document.querySelectorAll('.seatmini').forEach(el => {
      const occ = new Set((el.dataset.occ || '').split(',').filter(Boolean));
      const sel = new Set((el.dataset.sel || '').split(',').filter(Boolean));
      const names = new Map((el.dataset.names || '').split('~').filter(Boolean).map(p => p.split('|')));
      SeatMini.render(el, th, { occupied: occ, highlight: sel, names, cell: 22, showNumbers: true });
    });
  } catch (e) {}
}

// --- hardening state ---
let inflight = false;          // never stack fetch+render cycles
let lastPayload = null;        // skip DOM swaps when data is unchanged
let lastTouch = 0;             // defer refresh renders while a finger is busy
document.addEventListener('pointerdown', () => { lastTouch = Date.now(); }, { capture: true, passive: true });

// One delegated handler on the persistent container — survives every
// innerHTML swap, so taps can never hit a dead listener.
app.addEventListener('click', (e) => {
  const act = e.target.closest('[data-act]');
  if (act) {
    const a = act.dataset.act;
    if (a === 'show')  setShow(Number(act.dataset.val));
    else if (a === 'sort') setSort(act.dataset.val);
    else if (a === 'login') doLogin();
    else if (a === 'retry') boot(true);
    return;
  }
  const rect = e.target.closest('rect[data-seat]');
  if (rect) {
    const seat = rect.getAttribute('data-seat');
    const hit = (LAST_ROWS || []).find(x => String(x.theater_id) === String(AUD) && x.seat === seat && (!SHOW || x.showing_number === SHOW));
    setSel(hit ? partyKey(hit) : null);
    return;
  }
  const tr = e.target.closest('tr.g');
  if (tr) {
    setSel(tr.dataset.g);
    const box = document.querySelector('.mapbox');
    if (box && SEL && box.scrollIntoView) box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
});

async function boot(force) {
  if (inflight) return;
  inflight = true;
  try {
    const d = await fetchDirectory();
    if (!d.auth) { lastPayload = null; renderLogin(); return; }
    const payload = JSON.stringify(d.rows);
    const interacting = (Date.now() - lastTouch) < 1200;
    if (!force && payload === lastPayload) {
      // Data unchanged — leave the DOM alone (taps stay safe), just bump the stamp.
      const st = document.querySelector('.stamp');
      if (st) st.textContent = `Updated ${new Date().toLocaleTimeString()} \u00b7 refreshes automatically \u00b7 trouble? Scott 801-810-6642`;
      return;
    }
    if (!force && interacting && lastPayload !== null) return; // try again next tick
    lastPayload = payload;
    if (!AUD) renderIndex(d.rows); else renderRoom(d.rows);
  } catch (e) {
    if (lastPayload !== null) return; // keep showing good data over a transient error
    app.innerHTML = `<div class="card">Couldn't load (${esc(e.message)}). <button class="loginbox" data-act="retry" style="margin-left:8px;padding:8px 14px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-weight:700;cursor:pointer;">Retry</button></div>`;
  } finally {
    inflight = false;
    if (AUD && !timer) timer = setInterval(boot, 25000);
  }
}
boot(true);
</script>
</body>
</html>

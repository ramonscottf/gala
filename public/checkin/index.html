<style>
:root {
  --p2-navy: #11194a;
  --p2-navy-deep: #080d28;
  --p2-blue: #4a7df0;
  --p2-blue-deep: #2858d6;
  --p2-red: #d72846;
  --p2-red-soft: #ff4d70;
  --p2-gold: #f4b942;
  --p2-ink: #ffffff;
  --p2-muted: rgba(255, 255, 255, 0.72);
  --p2-subtle: rgba(255, 255, 255, 0.54);
  --p2-rule: rgba(255, 255, 255, 0.14);
  --p2-panel: rgba(20, 28, 72, 0.82);
  --p2-shadow: 0 10px 40px -22px rgba(0, 0, 0, 0.55);
  --p2-gradient-strip: linear-gradient(90deg, var(--p2-red), var(--p2-gold), var(--p2-blue-deep));
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  color: var(--p2-ink);
  min-height: 100dvh;
  padding: 28px 20px 48px;
  background:
    radial-gradient(circle at 8% 12%, rgba(215, 40, 70, 0.26), transparent 30%),
    radial-gradient(circle at 88% 8%, rgba(98, 200, 255, 0.14), transparent 28%),
    linear-gradient(135deg, #080916 0%, #11194a 52%, #171845 100%);
  background-attachment: fixed;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),

  background-size: 44px 44px;
  mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent 70%);

.eyebrow {

h1 {

.who-company {

  letter-spacing: 0.22em; text-transform: uppercase;

.who-name {
  font-family: 'Fraunces', Georgia, serif;

.ticket:first-of-type { margin-top: 18px; padding-top: 0; border-top: 0; }
.ticket-head { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 16px; }

.ticket-info { min-width: 0; flex: 1; }
.ticket-title {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 600; letter-spacing: -0.02em;
  font-size: clamp(22px, 5.4vw, 30px);
  line-height: 1.02; color: #fff;
  margin-bottom: 12px; text-wrap: balance;
}
.pill-pair { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.showtime-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 999px;
  font-size: 13px; font-weight: 800; letter-spacing: 0.02em;
}
.showtime-pill.early { background: rgba(74,125,240,0.18); border: 1px solid rgba(74,125,240,0.42); color: #9fb8ff; }
.showtime-pill.late  { background: rgba(215,40,70,0.18);  border: 1px solid rgba(215,40,70,0.44);  color: #ff8aa1; }
.showtime-pill .dot { width: 7px; height: 7px; border-radius: 999px; background: currentColor; opacity: 0.85; }
.aud-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 999px;
  background: rgba(244,185,66,0.16);
  border: 1px solid rgba(244,185,66,0.42);
  color: var(--p2-gold);
  font-size: 13px; font-weight: 800; letter-spacing: 0.02em;
}
.meta-pill {
  display: inline-flex; align-items: center;
  padding: 6px 14px; border-radius: 999px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--p2-rule);
  color: var(--p2-muted);
  font-size: 13px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
}

.sec-label {
  color: var(--p2-gold);
  font-size: 12px; font-weight: 900;
  letter-spacing: 0.22em; text-transform: uppercase;
  margin: 18px 0 10px;
}
.seatrow {
  display: flex; align-items: center; gap: 14px;
  background: rgba(255,255,255,0.05);

  padding: 4px 10px; border-radius: 999px;
  background: rgba(244,185,66,0.16);
  border: 1px solid rgba(244,185,66,0.36);

  font-size: 12px; font-weight: 700; letter-spacing: 0.01em;

}
.dinner-pill .em { font-size: 14px; line-height: 1; }

.seatmini { background: rgba(8,13,40,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 10px; overflow-x: auto; }
.seatmini__hint { font-size: 11.5px; color: var(--p2-subtle); text-align: center; margin-top: 8px; }

.qr-card { text-align: center; }
.qr-card__label {
  color: var(--p2-gold);
  font-size: 12px; font-weight: 900;
  letter-spacing: 0.22em; text-transform: uppercase;
  margin-bottom: 14px;
}
.qr-card__img {
  display: block; margin: 0 auto 12px;
  background: #fff; padding: 10px; border-radius: 14px;
  width: 220px; max-width: 100%; height: auto; aspect-ratio: 1;
}
.qr-card__hint { color: var(--p2-muted); font-size: 0.85rem; max-width: 320px; margin: 0 auto; }

.scanner-wrap {
  position: relative; aspect-ratio: 1; max-width: 400px;
  margin: 0 auto 14px; background: #000;
  border-radius: 14px; overflow: hidden;
}
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
.scanner-frame {
  position: absolute; inset: 12%;
  border: 3px solid var(--p2-red);
  border-radius: 12px; pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
}
.scanner-frame::before, .scanner-frame::after {
  content: ''; position: absolute; left: 0; right: 0; height: 2px;
  background: var(--p2-red); box-shadow: 0 0 8px var(--p2-red);
  animation: scan 2s ease-in-out infinite;
}
@keyframes scan { 0%,100% { top: 0; opacity: 1; } 50% { top: 100%; opacity: 0.6; } }

.btn {
  padding: 13px 24px; border-radius: 999px; border: 0;
  font-family: inherit; font-weight: 800; font-size: 0.9rem;
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn--red { background: linear-gradient(95deg, var(--p2-red), #883bb5 76%, var(--p2-blue-deep)); color: #fff; }
.btn--secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.22); }
.btn--full { width: 100%; padding: 15px; font-size: 0.95rem; }

input[type=text] {
  width: 100%; padding: 14px 16px;
  background: rgba(8,13,40,0.6);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px; font-size: 1rem; font-family: inherit; color: #fff;
}
input[type=text]::placeholder { color: var(--p2-subtle); }

.checked-in {
  background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.4);
  color: #6ee7b7; padding: 16px; border-radius: 14px;
  font-weight: 700; font-size: 1rem; margin-bottom: 14px; text-align: center;
}
.sponsor-note {
  background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.35);
  color: #a7f3d0; padding: 14px 16px; border-radius: 12px;
  font-size: 0.92rem; line-height: 1.45; text-align: center; margin-top: 10px;
}
.error-msg {
  background: rgba(215,40,70,0.14); border: 1px solid rgba(215,40,70,0.45);
  color: #ffb3c1; padding: 14px; border-radius: 12px;

}
.divider { text-align: center; color: var(--p2-subtle); font-size: 0.85rem; margin: 16px 0; }

<body>

<div class="wrap">
  <div class="eyebrow">DEF Gala 2026</div>
  <h1>My <span class="flair">ticket.</span></h1>
  <p class="sub">June 10, 2026 · Megaplex Theatres at Legacy Crossing</p>

  <div id="scanner-card" class="card">
    <div class="scanner-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="scanner-frame"></div>
    </div>
    <div class="divider">— OR —</div>
    <div style="margin-bottom:10px;">
      <input type="text" id="manual-token" placeholder="Type or paste the check-in code">
    </div>
    <button class="btn btn--red btn--full" id="manual-lookup">Look up</button>
    <div id="scanner-status" style="color:var(--ink-muted);font-size:0.8rem;text-align:center;margin-top:10px;"></div>
  </div>

  <div id="group-card" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"
        integrity="sha384-9Q0jWoineiIq95JeIyBsNV90KKLfDsbkj29k/YFxf76a2JwkHDYkMuSbNGN6XJfV"
        crossorigin="anonymous"></script>
<script>
const video = document.getElementById('video');
const scannerCard = document.getElementById('scanner-card');
const groupCard = document.getElementById('group-card');
const statusEl = document.getElementById('scanner-status');

let scanning = true;
let stream = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' },
    });
    video.srcObject = stream;
    await video.play();
    statusEl.textContent = 'Point camera at the QR code';
    requestAnimationFrame(scan);
  } catch (e) {
    statusEl.textContent = 'Camera unavailable — use the code input below';
  }
}

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
function scan() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' });
    if (code?.data) {
      const url = code.data;
      const m = url.match(/[?&]t=([A-Za-z0-9]+)/) || url.match(/\/(?:gala-seats|sponsor)\/([A-Za-z0-9]+)/) || url.match(/^([A-Za-z0-9]{10,})$/);
      const token = m ? m[1] : url;
      if (token) {
        scanning = false;
        if (stream) stream.getTracks().forEach(t => t.stop());
        lookupToken(token);
        return;
      }
    }
  }
  requestAnimationFrame(scan);
}

document.getElementById('manual-lookup').addEventListener('click', () => {
  const raw = document.getElementById('manual-token').value.trim();
  if (!raw) return;
  const m = raw.match(/[?&]t=([A-Za-z0-9]+)/) || raw.match(/\/(?:gala-seats|sponsor)\/([A-Za-z0-9]+)/) || raw.match(/^([A-Za-z0-9]{10,})$/);
  const token = m ? m[1] : raw;
  scanning = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  lookupToken(token);
});

async function lookupToken(token) {
  statusEl.textContent = 'Looking up…';
  try {
    const res = await fetch(`/api/gala/checkin/${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!res.ok) {
      renderError(data.error || 'Not found');
      return;
    }
    renderGroup(token, data);
  } catch (e) {
    renderError(e.message);
  }
}

function renderError(msg) {
  groupCard.innerHTML = `
    <div class="card">
      <div class="error-msg">⚠️ ${msg}</div>
      <button class="btn btn--secondary btn--full" onclick="location.reload()">Try again</button>
    </div>
  `;
  groupCard.style.display = 'block';
  scannerCard.style.display = 'none';
}

function renderGroup(token, data) {
  // Group seats by theater + showing — a building can host two showings.
  const groups = {};
  data.seats.forEach(s => {
    const k = s.theater_id + ':' + (s.showing_number || 1);
    (groups[k] = groups[k] || []).push(s);
  });

  const DINNERS = {
    frenchdip: { emoji: '\u{1F956}', label: 'Hot French Dip' },
    salad:     { emoji: '\u{1F957}', label: 'Chicken Salad' },
    veggie:    { emoji: '\u{1F331}', label: 'Vegetarian' },
    kids:      { emoji: '\u{1F9D2}', label: 'Kids Meal' },
  };
  const cards = Object.entries(groups).map(([k, seats]) => {
    const first = seats[0];
    const sorted = seats.sort((a,b) => a.row_label.localeCompare(b.row_label) || (Number(a.seat_num) - Number(b.seat_num)));
    const labels = sorted.map(s => s.row_label + s.seat_num);
    const isEarly = (first.showing_number || 1) === 1;
    const seatRows = sorted.map(s => {
      const d = s.dinner ? (DINNERS[s.dinner] || { emoji: '', label: s.dinner }) : null;
      return `
      <div class="seatrow">
        <span class="seat-num">${s.row_label}${s.seat_num}</span>
        <span class="seat-who">${s.guest_name || ''}</span>
        ${d ? `<span class="dinner-pill"><span class="em">${d.emoji}</span>${d.label}</span>` : ''}
      </div>`;
    }).join('');
    return `
      <div class="ticket">
        <div class="ticket-head">
          ${first.poster_url ? `<img class="ticket-poster" src="${first.poster_url}" alt="" aria-hidden="true">` : ''}
          <div class="ticket-info">
            <div class="ticket-title">${first.movie || 'Auditorium ' + first.theater_id}</div>
            <div class="pill-pair">
              <span class="showtime-pill ${isEarly ? 'early' : 'late'}"><span class="dot"></span>${isEarly ? 'Early' : 'Late'}${first.dinner_time ? ' \u00b7 ' + first.dinner_time : ''}</span>
              <span class="aud-pill">\u{1F3AC} Auditorium ${first.theater_id}</span>
              <span class="meta-pill">${sorted.length} seat${sorted.length === 1 ? '' : 's'}</span>
            </div>
            ${first.show_start ? `<div style="margin-top:10px;color:var(--p2-muted);font-size:0.88rem;">Doors &amp; dinner <strong style="color:#fff;">${first.dinner_time || ''}</strong> \u00b7 Movie starts <strong style="color:#fff;">${first.show_start}</strong></div>` : ''}
          </div>
        </div>
        <div class="sec-label">Seats in this group</div>
        ${seatRows}
        <div class="sec-label">Where you're sitting</div>
        <div class="seatmini" data-theater="${first.theater_id}" data-seats="${labels.join(',')}"></div>
        <div class="seatmini__hint">Your seats in gold \u2014 screen at the top.</div>
      </div>`;
  }).join('');

  const urlToken = new URL(location.href).searchParams.get('t');
  const isSponsorView = !!urlToken;

  groupCard.innerHTML = `
    <div class="card stripped">
      ${data.company ? `<div class="who-company">${data.company}</div>` : ''}
      <div class="who-name">${data.name || data.company || ''}</div>
      ${data.tier ? `<span class="tier">${data.tier}</span>` : ''}
      ${cards}
    </div>
    <div class="card stripped qr-card">
      <div class="qr-card__label">Your gala QR</div>
      <img src="/api/gala/qr?t=${encodeURIComponent(token)}&size=360" alt="Gala QR" class="qr-card__img" width="220" height="220"/>
      <div class="qr-card__hint">${isSponsorView
        ? 'Save this \u2014 any gala helper can scan it to pull up your seats in a second.'
        : 'Scanned \u2014 these are their seats. Point them to the gold ones.'}</div>
      <div style="margin-top:16px;">
        <button class="btn btn--secondary btn--full" onclick="location.reload()">${isSponsorView ? 'Refresh' : 'Scan another'}</button>
      </div>
    </div>
  `;
  groupCard.style.display = 'block';
  scannerCard.style.display = 'none';
  paintMiniMaps();
}

let _layoutsP = null;
async function paintMiniMaps() {
  try {
    _layoutsP = _layoutsP || SeatMini.load();
    const layouts = await _layoutsP;
    document.querySelectorAll('.seatmini').forEach(el => {
      const th = SeatMini.theater(layouts, el.dataset.theater);
      if (!th) return;
      SeatMini.render(el, th, { highlight: new Set(el.dataset.seats.split(',')), cell: 22 });
    });
  } catch (e) { /* map is decoration — never block the ticket info */ }
}

async function checkIn(token) {
  const btn = document.getElementById('checkin-btn');
  btn.disabled = true;
  btn.textContent = 'Checking in…';
  try {
    const res = await fetch(`/api/gala/checkin/${encodeURIComponent(token)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'checkin' }),
    });
    if (res.ok) {
      await lookupToken(token);
    } else {
      const data = await res.json();
      alert('Check-in failed: ' + (data.error || 'unknown'));
      btn.disabled = false;
    }
  } catch (e) {
    alert(e.message);
    btn.disabled = false;
  }
}

async function undoCheckin(token) {
  if (!confirm('Undo check-in for this group?')) return;
  try {
    const res = await fetch(`/api/gala/checkin/${encodeURIComponent(token)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'uncheckin' }),
    });
    if (res.ok) lookupToken(token);
  } catch {}
}

// If URL has ?t=TOKEN, sponsor arrived via SMS link — skip camera, go straight to their group view
const urlToken = new URLSearchParams(location.search).get('t');
if (urlToken) {
  scannerCard.style.display = 'none';
  statusEl.textContent = '';
  lookupToken(urlToken);
} else {
  startCamera();
}
</script>

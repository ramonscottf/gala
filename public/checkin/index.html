<style>
:root {
  --gala-red: #CB262C;
  --gala-red-deep: #a01f24;
  --navy-950: #0b1b3c;
  --navy-900: #122a57;
  --gold-400: #ffc24d;
  --ink: #1e293b;
  --ink-soft: #475569;
  --ink-muted: #94a3b8;
  --border: #e2e8f0;
  --bg-soft: #f8fafc;
  --success: #059669;
  --success-bg: #ecfdf5;
  --warn: #d97706;
  --danger: #dc2626;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--navy-950);
  color: #fff;
  min-height: 100vh;
  padding: 20px;
}
.wrap { max-width: 560px; margin: 0 auto; }
.card {
  background: #fff;
  color: var(--ink);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  margin-bottom: 16px;
}
h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.7rem;
  color: #fff;
  margin-bottom: 4px;
}
h1 span {
  background: linear-gradient(90deg, var(--gala-red), var(--gold-400), var(--gala-red));
  background-size: 200% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: shim 4s linear infinite;
}
@keyframes shim { 0%{background-position:0% center;} 100%{background-position:200% center;} }
.sub { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-bottom: 24px; }

.scanner-wrap {
  position: relative;
  aspect-ratio: 1;
  max-width: 400px;
  margin: 0 auto 14px;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
}
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
.scanner-frame {
  position: absolute; inset: 12%;
  border: 3px solid var(--gala-red);
  border-radius: 12px;
  pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
}
.scanner-frame::before,
.scanner-frame::after {
  content: '';
  position: absolute;
  left: 0; right: 0; height: 2px;
  background: var(--gala-red);
  box-shadow: 0 0 8px var(--gala-red);
  animation: scan 2s ease-in-out infinite;
}
@keyframes scan {
  0%, 100% { top: 0; opacity: 1; }
  50% { top: 100%; opacity: 0.6; }
}

.btn {
  padding: 12px 24px;
  border-radius: 50px;
  border: none;
  font-family: inherit;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn--red {
  background: linear-gradient(135deg, var(--gala-red), var(--gala-red-deep));
  color: #fff;
}
.btn--secondary {
  background: #fff;
  color: var(--ink);
  border: 1.5px solid var(--border);
}
.btn--full { width: 100%; justify-content: center; padding: 16px; font-size: 1rem; }

input[type=text] {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 1rem;
  font-family: inherit;
}

.group-display {
  text-align: center;
  padding: 28px 24px;
}
.group-display h2 {
  font-family: 'Fraunces', Georgia, serif;
  color: var(--navy-900);
  font-size: 1.6rem;
  margin-bottom: 6px;
}
.qr-block {
  margin: 20px auto 22px;
  padding: 18px;
  background: var(--navy-950);
  border-radius: 14px;
  max-width: 280px;
}
.qr-block__label {
  color: var(--gold-400);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.qr-block__img {
  display: block;
  margin: 0 auto 10px;
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  width: 220px;
  height: 220px;
  max-width: 100%;
  height: auto;
  aspect-ratio: 1;
}
.qr-block__hint {
  color: rgba(255,255,255,0.7);
  font-size: 0.8rem;
}
.sponsor-note {
  background: var(--success-bg);
  color: #065f46;
  padding: 14px 16px;
  border-radius: 10px;
  font-size: 0.95rem;
  line-height: 1.45;
  text-align: center;
  margin-top: 10px;
}
.group-display .tier {
  display: inline-block;
  padding: 4px 14px;
  background: rgba(203,38,44,0.1);
  color: var(--gala-red);
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-radius: 20px;
  margin: 8px 0 14px;
}
.seats-list {
  background: var(--bg-soft);
  border-radius: 12px;
  padding: 14px 18px;
  text-align: left;
  margin-bottom: 18px;
  font-size: 0.95rem;
  line-height: 1.8;
}
.seats-list strong { color: var(--navy-900); }

.checked-in {
  background: var(--success-bg);
  border: 1.5px solid var(--success);
  color: var(--success);
  padding: 16px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 1.1rem;
  margin-bottom: 14px;
}
.error-msg {
  background: #fef2f2;
  border: 1.5px solid var(--danger);
  color: var(--danger);
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 14px;
  font-size: 0.9rem;
}
.divider { text-align: center; color: var(--ink-muted); font-size: 0.85rem; margin: 16px 0; }
</style>

<body>

<div class="wrap">
  <h1>Gala <span>Check-In</span></h1>
  <p class="sub">June 10, 2026 · Megaplex Theatres at Legacy Crossing</p>

  <div id="scanner-card" class="card">
    <div class="scanner-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="scanner-frame"></div>
    </div>
    <div class="divider">— OR —</div>
    <div style="margin-bottom:10px;">
      <input type="text" id="manual-token" placeholder="Type or paste the check-in code">
    </div>
    <button class="btn btn--red btn--full" id="manual-lookup">Look up</button>
    <div id="scanner-status" style="color:var(--ink-muted);font-size:0.8rem;text-align:center;margin-top:10px;"></div>
  </div>

  <div id="group-card" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"
        integrity="sha384-9Q0jWoineiIq95JeIyBsNV90KKLfDsbkj29k/YFxf76a2JwkHDYkMuSbNGN6XJfV"
        crossorigin="anonymous"></script>
<script>
const video = document.getElementById('video');
const scannerCard = document.getElementById('scanner-card');
const groupCard = document.getElementById('group-card');
const statusEl = document.getElementById('scanner-status');

let scanning = true;
let stream = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' },
    });
    video.srcObject = stream;
    await video.play();
    statusEl.textContent = 'Point camera at the QR code';
    requestAnimationFrame(scan);
  } catch (e) {
    statusEl.textContent = 'Camera unavailable — use the code input below';
  }
}

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
function scan() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' });
    if (code?.data) {
      const url = code.data;
      const m = url.match(/[?&]t=([A-Za-z0-9]+)/) || url.match(/\/(?:gala-seats|sponsor)\/([A-Za-z0-9]+)/) || url.match(/^([A-Za-z0-9]{10,})$/);
      const token = m ? m[1] : url;
      if (token) {
        scanning = false;
        if (stream) stream.getTracks().forEach(t => t.stop());
        lookupToken(token);
        return;
      }
    }
  }
  requestAnimationFrame(scan);
}

document.getElementById('manual-lookup').addEventListener('click', () => {
  const raw = document.getElementById('manual-token').value.trim();
  if (!raw) return;
  const m = raw.match(/[?&]t=([A-Za-z0-9]+)/) || raw.match(/\/(?:gala-seats|sponsor)\/([A-Za-z0-9]+)/) || raw.match(/^([A-Za-z0-9]{10,})$/);
  const token = m ? m[1] : raw;
  scanning = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  lookupToken(token);
});

async function lookupToken(token) {
  statusEl.textContent = 'Looking up…';
  try {
    const res = await fetch(`/api/gala/checkin/${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!res.ok) {
      renderError(data.error || 'Not found');
      return;
    }
    renderGroup(token, data);
  } catch (e) {
    renderError(e.message);
  }
}

function renderError(msg) {
  groupCard.innerHTML = `
    <div class="card">
      <div class="error-msg">⚠️ ${msg}</div>
      <button class="btn btn--secondary btn--full" onclick="location.reload()">Try again</button>
    </div>
  `;
  groupCard.style.display = 'block';
  scannerCard.style.display = 'none';
}

function renderGroup(token, data) {
  const seatsByTheater = {};
  data.seats.forEach(s => {
    if (!seatsByTheater[s.theater_id]) seatsByTheater[s.theater_id] = [];
    seatsByTheater[s.theater_id].push(s);
  });
  const seatList = Object.entries(seatsByTheater).map(([tid, seats]) => {
    const sorted = seats.sort((a,b) => a.row_label.localeCompare(b.row_label) || String(a.seat_num).localeCompare(String(b.seat_num)));
    const rows = sorted.map(s => `Row ${s.row_label}-${s.seat_num}`).join(', ');
    return `<div><strong>Auditorium ${tid}:</strong> ${rows}</div>`;
  }).join('');

  const alreadyChecked = data.checkedInCount === data.seatCount;

  // Detect: did the sponsor land here via the SMS link (URL has ?t=TOKEN)?
  // vs staff scanning via camera (URL has no token param).
  const urlToken = new URL(location.href).searchParams.get('t');
  const isSponsorView = !!urlToken;

  const qrBlock = `
    <div class="qr-block">
      <div class="qr-block__label">Your check-in QR</div>
      <img src="/api/gala/qr?t=${encodeURIComponent(token)}&size=360" alt="Check-in QR" class="qr-block__img" width="220" height="220"/>
      <div class="qr-block__hint">${isSponsorView ? 'Show this at the check-in table on June 10' : 'Scanned — confirm below'}</div>
    </div>
  `;

  groupCard.innerHTML = `
    <div class="card group-display">
      <h2>${data.company}</h2>
      <div style="color:var(--ink-soft);font-size:0.95rem;">${data.name}</div>
      ${data.tier ? `<span class="tier">${data.tier}</span>` : ''}
      ${qrBlock}
      <div class="seats-list">
        <div style="margin-bottom:6px;"><strong>${data.seatCount} seat${data.seatCount===1?'':'s'}</strong></div>
        ${seatList}
      </div>
      ${alreadyChecked ? `
        <div class="checked-in">✓ Checked in at ${new Date(data.seats[0].checked_in_at).toLocaleTimeString()}</div>
        ${isSponsorView ? '' : `<button class="btn btn--secondary btn--full" onclick="undoCheckin('${token}')">Undo Check-In</button>`}
      ` : isSponsorView ? `
        <div class="sponsor-note">Show the QR above to a gala volunteer on June 10 to check in.</div>
      ` : `
        <button class="btn btn--red btn--full" onclick="checkIn('${token}')" id="checkin-btn">
          ✓ Check In ${data.seatCount} Guest${data.seatCount===1?'':'s'}
        </button>
      `}
      <div style="margin-top:12px;">
        <button class="btn btn--secondary btn--full" onclick="location.reload()">${isSponsorView ? 'Refresh' : 'Scan another'}</button>
      </div>
    </div>
  `;
  groupCard.style.display = 'block';
  scannerCard.style.display = 'none';
}

async function checkIn(token) {
  const btn = document.getElementById('checkin-btn');
  btn.disabled = true;
  btn.textContent = 'Checking in…';
  try {
    const res = await fetch(`/api/gala/checkin/${encodeURIComponent(token)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'checkin' }),
    });
    if (res.ok) {
      await lookupToken(token);
    } else {
      const data = await res.json();
      alert('Check-in failed: ' + (data.error || 'unknown'));
      btn.disabled = false;
    }
  } catch (e) {
    alert(e.message);
    btn.disabled = false;
  }
}

async function undoCheckin(token) {
  if (!confirm('Undo check-in for this group?')) return;
  try {
    const res = await fetch(`/api/gala/checkin/${encodeURIComponent(token)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'uncheckin' }),
    });
    if (res.ok) lookupToken(token);
  } catch {}
}

// If URL has ?t=TOKEN, sponsor arrived via SMS link — skip camera, go straight to their group view
const urlToken = new URLSearchParams(location.search).get('t');
if (urlToken) {
  scannerCard.style.display = 'none';
  statusEl.textContent = '';
  lookupToken(urlToken);
} else {
  startCamera();
}
</script>

</body>

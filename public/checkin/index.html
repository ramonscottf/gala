<style>
:root {
  --gala-red: #CB262C;
  --gala-red-deep: #a01f24;
  --navy-950: #0b1b3c;
  --navy-900: #122a57;
  --gold-400: #ffc24d;
  --blue: #2858d6;
  --panel: rgba(17,28,60,0.72);
  --line: rgba(255,255,255,0.10);
  --txt-soft: rgba(255,255,255,0.72);
  --txt-muted: rgba(255,255,255,0.5);
  --success: #34d399;
  --danger: #f87171;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: radial-gradient(1200px 800px at 18% -8%, #24508f, #122a57 42%, #0b1b3c 68%, #050b1c 100%) fixed;
  color: #fff;
  min-height: 100vh;
  padding: 20px;
}
.wrap { max-width: 560px; margin: 0 auto; }
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  margin-bottom: 16px;
  color: #fff;
}
h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.7rem;
  color: #fff;
  margin-bottom: 4px;
}
h1 span { color: var(--gold-400); font-style: italic; }
.sub { color: var(--txt-soft); font-size: 0.9rem; margin-bottom: 24px; }

.scanner-wrap {
  position: relative;
  aspect-ratio: 1;
  max-width: 400px;
  margin: 0 auto 14px;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
}
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
.scanner-frame {
  position: absolute; inset: 12%;
  border: 3px solid var(--gala-red);
  border-radius: 12px;
  pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
}
.scanner-frame::before,
.scanner-frame::after {
  content: '';
  position: absolute;
  left: 0; right: 0; height: 2px;
  background: var(--gala-red);
  box-shadow: 0 0 8px var(--gala-red);
  animation: scan 2s ease-in-out infinite;
}
@keyframes scan {
  0%, 100% { top: 0; opacity: 1; }
  50% { top: 100%; opacity: 0.6; }
}

.btn {
  padding: 12px 24px;
  border-radius: 50px;
  border: none;
  font-family: inherit;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn--red {
  background: linear-gradient(135deg, var(--gala-red), var(--gala-red-deep));
  color: #fff;
}
.btn--secondary {
  background: rgba(255,255,255,0.08);
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.22);
}
.btn--full { width: 100%; justify-content: center; padding: 16px; font-size: 1rem; }

input[type=text] {
  width: 100%;
  padding: 14px 16px;
  background: rgba(5,11,28,0.6);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 10px;
  font-size: 1rem;
  font-family: inherit;
  color: #fff;
}
input[type=text]::placeholder { color: var(--txt-muted); }

.group-display {
  text-align: center;
  padding: 28px 24px;
}
.group-display h2 {
  font-family: 'Fraunces', Georgia, serif;
  color: #fff;
  font-size: 1.6rem;
  margin-bottom: 6px;
}
.group-display > p { color: var(--txt-soft); }
.qr-block {
  margin: 20px auto 22px;
  padding: 18px;
  background: rgba(5,11,28,0.65);
  border: 1px solid var(--line);
  border-radius: 14px;
  max-width: 280px;
}
.qr-block__label {
  color: var(--gold-400);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.qr-block__img {
  display: block;
  margin: 0 auto 10px;
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  width: 220px;
  max-width: 100%;
  height: auto;
  aspect-ratio: 1;
}
.qr-block__hint {
  color: var(--txt-soft);
  font-size: 0.8rem;
}
.sponsor-note {
  background: rgba(52,211,153,0.12);
  border: 1px solid rgba(52,211,153,0.35);
  color: #a7f3d0;
  padding: 14px 16px;
  border-radius: 10px;
  font-size: 0.95rem;
  line-height: 1.45;
  text-align: center;
  margin-top: 10px;
}
.group-display .tier {
  display: inline-block;
  padding: 4px 14px;
  background: rgba(255,194,77,0.14);
  border: 1px solid rgba(255,194,77,0.45);
  color: var(--gold-400);
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-radius: 20px;
  margin: 8px 0 14px;
}
.seats-list {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 18px;
  text-align: left;
  margin-bottom: 18px;
  font-size: 0.95rem;
  line-height: 1.8;
}
.seats-list strong { color: var(--gold-400); }

.checked-in {
  background: rgba(52,211,153,0.12);
  border: 1.5px solid var(--success);
  color: var(--success);
  padding: 16px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 1.1rem;
  margin-bottom: 14px;
}
.error-msg {
  background: rgba(248,113,113,0.12);
  border: 1.5px solid var(--danger);
  color: #fecaca;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 14px;
  font-size: 0.9rem;
}
.divider { text-align: center; color: var(--txt-muted); font-size: 0.85rem; margin: 16px 0; }

.show-card{background:rgba(255,255,255,0.04);border:1px solid var(--line);border-radius:14px;padding:16px;margin:14px 0;text-align:left;}
.seatmini{background:rgba(5,11,28,0.55);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:8px;overflow-x:auto;}
.seatmini__hint{font-size:11.5px;color:var(--txt-muted);text-align:center;margin-top:6px;}

.tk-head{display:flex;gap:14px;align-items:flex-start;}
.tk-poster{width:86px;aspect-ratio:2/3;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,0.14);flex-shrink:0;}
.tk-info{min-width:0;flex:1;}
.tk-eyebrow{color:#ff8a8e;font-size:10.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:2px;}
.tk-title{font-family:'Fraunces',Georgia,serif;font-size:1.35rem;font-weight:700;line-height:1.15;margin-bottom:10px;color:#fff;}
.tk-rows{font-size:0.9rem;}
.tk-row{display:flex;gap:12px;padding:2px 0;}
.tk-row span{color:var(--txt-muted);min-width:108px;}
.tk-row strong{font-weight:700;color:#fff;}
.tk-divider{height:1px;background:var(--line);margin:14px 0;}
.tk-label{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-400);margin-bottom:8px;}
.tk-seatrow{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:0.92rem;}
.tk-chip{background:var(--gala-red);color:#fff;border-radius:6px;padding:4px 9px;font-weight:800;font-size:13px;flex-shrink:0;}
.tk-who{min-width:0;flex:1;font-weight:600;color:#fff;text-align:left;}
.tk-dinner{color:var(--txt-muted);font-size:12.5px;white-space:nowrap;}
</style>

<body>

<div class="wrap">
  <h1>My <span>Ticket</span></h1>
  <p class="sub">June 10, 2026 · Megaplex Theatres at Legacy Crossing</p>

  <div id="scanner-card" class="card">
    <div class="scanner-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="scanner-frame"></div>
    </div>
    <div class="divider">— OR —</div>
    <div style="margin-bottom:10px;">
      <input type="text" id="manual-token" placeholder="Type or paste the check-in code">
    </div>
    <button class="btn btn--red btn--full" id="manual-lookup">Look up</button>
    <div id="scanner-status" style="color:var(--ink-muted);font-size:0.8rem;text-align:center;margin-top:10px;"></div>
  </div>

  <div id="group-card" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"
        integrity="sha384-9Q0jWoineiIq95JeIyBsNV90KKLfDsbkj29k/YFxf76a2JwkHDYkMuSbNGN6XJfV"
        crossorigin="anonymous"></script>
<script>
const video = document.getElementById('video');
const scannerCard = document.getElementById('scanner-card');
const groupCard = document.getElementById('group-card');
const statusEl = document.getElementById('scanner-status');

let scanning = true;
let stream = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' },
    });
    video.srcObject = stream;
    await video.play();
    statusEl.textContent = 'Point camera at the QR code';
    requestAnimationFrame(scan);
  } catch (e) {
    statusEl.textContent = 'Camera unavailable — use the code input below';
  }
}

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
function scan() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' });
    if (code?.data) {
      const url = code.data;
      const m = url.match(/[?&]t=([A-Za-z0-9]+)/) || url.match(/\/(?:gala-seats|sponsor)\/([A-Za-z0-9]+)/) || url.match(/^([A-Za-z0-9]{10,})$/);
      const token = m ? m[1] : url;
      if (token) {
        scanning = false;
        if (stream) stream.getTracks().forEach(t => t.stop());
        lookupToken(token);
        return;
      }
    }
  }
  requestAnimationFrame(scan);
}

document.getElementById('manual-lookup').addEventListener('click', () => {
  const raw = document.getElementById('manual-token').value.trim();
  if (!raw) return;
  const m = raw.match(/[?&]t=([A-Za-z0-9]+)/) || raw.match(/\/(?:gala-seats|sponsor)\/([A-Za-z0-9]+)/) || raw.match(/^([A-Za-z0-9]{10,})$/);
  const token = m ? m[1] : raw;
  scanning = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  lookupToken(token);
});

async function lookupToken(token) {
  statusEl.textContent = 'Looking up…';
  try {
    const res = await fetch(`/api/gala/checkin/${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!res.ok) {
      renderError(data.error || 'Not found');
      return;
    }
    renderGroup(token, data);
  } catch (e) {
    renderError(e.message);
  }
}

function renderError(msg) {
  groupCard.innerHTML = `
    <div class="card">
      <div class="error-msg">⚠️ ${msg}</div>
      <button class="btn btn--secondary btn--full" onclick="location.reload()">Try again</button>
    </div>
  `;
  groupCard.style.display = 'block';
  scannerCard.style.display = 'none';
}

function renderGroup(token, data) {
  // Group seats by theater + showing — a building can host two showings.
  const groups = {};
  data.seats.forEach(s => {
    const k = s.theater_id + ':' + (s.showing_number || 1);
    (groups[k] = groups[k] || []).push(s);
  });

  const DINNERS = { frenchdip: 'Hot French Dip', salad: 'Chicken Salad', veggie: 'Vegetarian', kids: 'Kids Meal' };
  const cards = Object.entries(groups).map(([k, seats]) => {
    const first = seats[0];
    const sorted = seats.sort((a,b) => a.row_label.localeCompare(b.row_label) || (Number(a.seat_num) - Number(b.seat_num)));
    const labels = sorted.map(s => s.row_label + s.seat_num);
    const seatRows = sorted.map(s => `
      <div class="tk-seatrow">
        <span class="tk-chip">${s.row_label}${s.seat_num}</span>
        <span class="tk-who">${s.guest_name || ''}</span>
        <span class="tk-dinner">${s.dinner ? (DINNERS[s.dinner] || s.dinner) : ''}</span>
      </div>`).join('');
    return `
      <div class="show-card">
        <div class="tk-head">
          ${first.poster_url ? `<img class="tk-poster" src="${first.poster_url}" alt="" aria-hidden="true">` : ''}
          <div class="tk-info">
            <div class="tk-eyebrow">Your movie</div>
            <div class="tk-title">${first.movie || 'Auditorium ' + first.theater_id}</div>
            <div class="tk-rows">
              <div class="tk-row"><span>Auditorium</span><strong>#${first.theater_id}</strong></div>
              ${first.dinner_time ? `<div class="tk-row"><span>Doors &amp; dinner</span><strong>${first.dinner_time}</strong></div>` : ''}
              ${first.show_start ? `<div class="tk-row"><span>Movie starts</span><strong>${first.show_start}</strong></div>` : ''}
            </div>
          </div>
        </div>
        <div class="tk-divider"></div>
        <div class="tk-label">Your seats</div>
        ${seatRows}
        <div class="tk-label" style="margin-top:14px;">Where you're sitting</div>
        <div class="seatmini" data-theater="${first.theater_id}" data-seats="${labels.join(',')}"></div>
        <div class="seatmini__hint">Your seats in gold — screen at the top.</div>
      </div>`;
  }).join('');

  const urlToken = new URL(location.href).searchParams.get('t');
  const isSponsorView = !!urlToken;

  groupCard.innerHTML = `
    <div class="card group-display">
      <h2>${data.company || data.name}</h2>
      <div style="color:var(--ink-soft);font-size:0.95rem;">${data.name}${data.company && data.name !== data.company ? '' : ''}</div>
      ${data.tier ? `<span class="tier">${data.tier}</span>` : ''}
      ${cards}
      <div class="qr-block">
        <div class="qr-block__label">Your gala QR</div>
        <img src="/api/gala/qr?t=${encodeURIComponent(token)}&size=360" alt="Gala QR" class="qr-block__img" width="220" height="220"/>
        <div class="qr-block__hint">${isSponsorView
          ? 'Save this — any gala helper can scan it to pull up your seats in a second.'
          : 'Scanned — these are their seats. Point them to the gold ones.'}</div>
      </div>
      <div style="margin-top:12px;">
        <button class="btn btn--secondary btn--full" onclick="location.reload()">${isSponsorView ? 'Refresh' : 'Scan another'}</button>
      </div>
    </div>
  `;
  groupCard.style.display = 'block';
  scannerCard.style.display = 'none';
  paintMiniMaps();
}

let _layoutsP = null;
async function paintMiniMaps() {
  try {
    _layoutsP = _layoutsP || SeatMini.load();
    const layouts = await _layoutsP;
    document.querySelectorAll('.seatmini').forEach(el => {
      const th = SeatMini.theater(layouts, el.dataset.theater);
      if (!th) return;
      SeatMini.render(el, th, { highlight: new Set(el.dataset.seats.split(',')), cell: 22 });
    });
  } catch (e) { /* map is decoration — never block the ticket info */ }
}

async function checkIn(token) {
  const btn = document.getElementById('checkin-btn');
  btn.disabled = true;
  btn.textContent = 'Checking in…';
  try {
    const res = await fetch(`/api/gala/checkin/${encodeURIComponent(token)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'checkin' }),
    });
    if (res.ok) {
      await lookupToken(token);
    } else {
      const data = await res.json();
      alert('Check-in failed: ' + (data.error || 'unknown'));
      btn.disabled = false;
    }
  } catch (e) {
    alert(e.message);
    btn.disabled = false;
  }
}

async function undoCheckin(token) {
  if (!confirm('Undo check-in for this group?')) return;
  try {
    const res = await fetch(`/api/gala/checkin/${encodeURIComponent(token)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'uncheckin' }),
    });
    if (res.ok) lookupToken(token);
  } catch {}
}

// If URL has ?t=TOKEN, sponsor arrived via SMS link — skip camera, go straight to their group view
const urlToken = new URLSearchParams(location.search).get('t');
if (urlToken) {
  scannerCard.style.display = 'none';
  statusEl.textContent = '';
  lookupToken(urlToken);
} else {
  startCamera();
}
</script>

</body>

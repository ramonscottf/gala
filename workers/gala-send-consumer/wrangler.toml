# wrangler.toml — gala-send-consumer
#
# Queue consumer worker that processes gala-marketing-send messages.
# Deploy with: cd workers/gala-send-consumer && wrangler deploy
#
# Bindings expected:
#   GALA_DB    — D1 database gala-seating (1468a0b3-cc6c-49a6-ad89-421e9fb00a86)
#   MAIL_TOKEN — secret for SkippyMail bearer auth (set via `wrangler secret put MAIL_TOKEN`)

name = "gala-send-consumer"
main = "index.mjs"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "GALA_DB"
database_name = "gala-seating"
database_id = "1468a0b3-cc6c-49a6-ad89-421e9fb00a86"

[[queues.consumers]]
queue = "gala-marketing-send"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
max_concurrency = 4
retry_delay = 30
dead_letter_queue = "gala-marketing-send-dlq"
